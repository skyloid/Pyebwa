name: Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@6c64db94d5b2e09d7e0948fb6bd3166cc6fffbc7 # pinned
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6 # v2
      with:
        languages: javascript, python

    - name: Check for hardcoded credentials
      run: |
        # Check for potential API keys, passwords, etc.
        ! grep -r -E "(api[_-]?key|password|secret|token)\s*[:=]\s*['\"][^'\"]+['\"]" \
          --include="*.js" --include="*.py" --include="*.html" \
          --exclude-dir=node_modules --exclude-dir=.git \
          . || echo "Warning: Potential hardcoded credentials found"
