<!DOCTYPE html>
<html>
<head>
    <title>Authentication Relay</title>
</head>
<body>
    <script>
        // Auth relay no longer needed - Supabase handles auth on rasin.pyebwa.com
        // This page kept for backward compat - sends "not authenticated" to parent
        if (window.parent !== window) {
            window.parent.postMessage({
                type: 'pyebwa-auth-state',
                authenticated: false
            }, 'https://rasin.pyebwa.com');
        }
    </script>
</body>
</html>
