<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Test</title>
    <link rel="stylesheet" href="css/styles.css?v=2345569">
    <link rel="stylesheet" href="css/mobile.css?v=3" media="(max-width: 768px)">
    <link rel="stylesheet" href="css/mobile-enhanced.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <!-- Theme Toggle Button — same as index.html -->
    <button id="themeToggle" aria-label="Toggle dark mode">
        <span class="material-icons" id="themeIcon">dark_mode</span>
    </button>

    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            function updateIcon() {
                var icon = document.getElementById('themeIcon');
                if (icon) {
                    icon.textContent = document.body.classList.contains('dark-mode') ? 'light_mode' : 'dark_mode';
                }
            }

            window.toggleDarkMode = function() {
                document.body.classList.toggle('dark-mode');
                var isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateIcon();
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateIcon);
            } else {
                updateIcon();
            }

            document.addEventListener('DOMContentLoaded', function() {
                var btn = document.getElementById('themeToggle');
                if (btn) {
                    btn.addEventListener('click', window.toggleDarkMode);
                }
            });
        })();
    </script>

    <div style="padding: 100px 20px; font-family: sans-serif;">
        <h1>Toggle Dark Mode Test</h1>
        <p>Click the circular button in the top-right corner to toggle dark mode.</p>
        <p>You can also click this button:</p>
        <button onclick="window.toggleDarkMode()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: 2px solid #333;">
            Toggle Dark Mode Manually
        </button>

        <h2 style="margin-top: 40px;">Diagnostics:</h2>
        <pre id="debug" style="background: #f0f0f0; padding: 20px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; font-size: 14px;"></pre>
    </div>

    <script>
        function runDiagnostics() {
            var btn = document.getElementById('themeToggle');
            var debug = document.getElementById('debug');
            var lines = [];

            lines.push('=== Button State ===');
            lines.push('Button exists: ' + !!btn);

            if (btn) {
                var cs = window.getComputedStyle(btn);
                lines.push('display: ' + cs.display);
                lines.push('visibility: ' + cs.visibility);
                lines.push('opacity: ' + cs.opacity);
                lines.push('pointer-events: ' + cs.pointerEvents);
                lines.push('position: ' + cs.position);
                lines.push('top: ' + cs.top);
                lines.push('right: ' + cs.right);
                lines.push('width x height: ' + cs.width + ' x ' + cs.height);
                lines.push('z-index: ' + cs.zIndex);

                var rect = btn.getBoundingClientRect();
                lines.push('\n=== Bounding Rect ===');
                lines.push('top: ' + rect.top.toFixed(0) + ', left: ' + rect.left.toFixed(0));
                lines.push('right: ' + rect.right.toFixed(0) + ', bottom: ' + rect.bottom.toFixed(0));
                lines.push('On screen: ' + (rect.top >= 0 && rect.left >= 0 && rect.bottom <= window.innerHeight && rect.right <= window.innerWidth));

                var centerX = rect.left + rect.width / 2;
                var centerY = rect.top + rect.height / 2;
                var topEl = document.elementFromPoint(centerX, centerY);
                lines.push('\n=== Hit Test ===');
                lines.push('Element at button center: ' + (topEl ? topEl.tagName + (topEl.id ? '#' + topEl.id : '') + (topEl.className ? '.' + topEl.className.split(' ').join('.') : '') : 'null'));
                lines.push('Is button or child: ' + (topEl === btn || btn.contains(topEl)));

                var icon = document.getElementById('themeIcon');
                lines.push('\n=== Icon ===');
                lines.push('Icon exists: ' + !!icon);
                if (icon) {
                    lines.push('Icon text: "' + icon.textContent + '"');
                    var ics = window.getComputedStyle(icon);
                    lines.push('Icon font-family: ' + ics.fontFamily.substring(0, 50));
                    lines.push('Icon rendered size: ' + ics.fontSize);
                }
            }

            lines.push('\n=== Theme State ===');
            lines.push('localStorage theme: ' + localStorage.getItem('theme'));
            lines.push('body has dark-mode: ' + document.body.classList.contains('dark-mode'));
            lines.push('typeof toggleDarkMode: ' + typeof window.toggleDarkMode);

            lines.push('\n=== Toggle Test ===');
            try {
                var before = document.body.classList.contains('dark-mode');
                window.toggleDarkMode();
                var after = document.body.classList.contains('dark-mode');
                lines.push('Before: ' + before + ', After: ' + after + ', Changed: ' + (before !== after));
                window.toggleDarkMode(); // revert
            } catch(e) {
                lines.push('ERROR: ' + e.message);
            }

            debug.textContent = lines.join('\n');
        }

        setTimeout(runDiagnostics, 1500);
    </script>
</body>
</html>
