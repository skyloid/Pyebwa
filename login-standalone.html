<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sign In - Pyebwa Family Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary-blue: #00217D; --primary-red: #D41125; --white: #FFFFFF; --gray-50: #F9FAFB; --gray-200: #E5E7EB; --gray-700: #374151; --gray-900: #111827; --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: var(--white); border-radius: 16px; padding: 40px; box-shadow: var(--shadow-xl); width: 100%; max-width: 420px; position: relative; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary-blue) 50%, var(--primary-red) 50%); }
        .logo { text-align: center; margin-bottom: 10px; }
        .logo h1 { color: var(--primary-blue); font-size: 32px; font-weight: 700; }
        .logo p { color: var(--gray-700); font-size: 14px; }
        h2 { color: var(--gray-900); text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { color: var(--gray-700); text-align: center; font-size: 16px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gray-700); font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 16px; background: var(--gray-50); }
        input:focus { outline: none; border-color: var(--primary-blue); background: var(--white); }
        button { width: 100%; padding: 14px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary-blue); color: var(--white); }
        .btn-primary:hover:not(:disabled) { background: #001654; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .message { display: none; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .message.error { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; display: flex; }
        .message.success { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; display: flex; }
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: var(--primary-blue); text-decoration: none; font-size: 14px; font-weight: 500; }
        .continue-btn { background: var(--primary-blue); color: var(--white); padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>Pyebwa</h1><p>Your Family Tree</p></div>
        <div id="loginView">
            <h2>Sign In</h2>
            <p class="subtitle">Enter your email and password to access your family tree</p>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="loginBtn"><i class="material-icons">login</i> Sign In</button>
            </form>
            <div class="links">
                Don't have an account? <a href="/signup-standalone.html">Sign Up</a><br>
                <a href="https://pyebwa.com">&larr; Back to Homepage</a>
            </div>
        </div>
        <div id="successView" style="display: none; text-align: center;">
            <i class="material-icons" style="font-size: 64px; color: var(--primary-blue); margin-bottom: 20px;">check_circle</i>
            <h2>Login Successful!</h2>
            <p class="subtitle">Welcome back! You can now access your family tree.</p>
            <a href="/app/" class="continue-btn">Continue to App</a>
            <p style="margin-top: 30px; color: var(--gray-700); font-size: 14px;">
                You will be redirected automatically in <span id="countdown">5</span> seconds...
            </p>
        </div>
    </div>
    <script>
        const messageDiv = document.getElementById('message');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        function showMessage(text, type) {
            messageDiv.innerHTML = '<i class="material-icons">' + (type === 'error' ? 'error' : 'check_circle') + '</i> ' + text;
            messageDiv.className = 'message ' + type;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMessage('Please fill in all fields.', 'error'); return; }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Signing in...';
            try {
                const _sb = supabase.createClient(window.location.origin + '/supabase', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc1MTk5NDM4LCJleHAiOjE5MzI4Nzk0Mzh9.t_O46hoypu8qZjZgiM_GjMkwhDBhwFa-IXRMjnQ5m7o');
                const { data, error } = await _sb.auth.signInWithPassword({ email, password });
                if (error) throw new Error(error.message);

                document.getElementById('loginView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

                let countdown = 5;
                const countdownEl = document.getElementById('countdown');
                const interval = setInterval(() => {
                    countdown--;
                    countdownEl.textContent = countdown;
                    if (countdown <= 0) { clearInterval(interval); window.location.href = '/app/'; }
                }, 1000);
            } catch (error) {
                showMessage(error.message || 'Login failed. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="material-icons">login</i> Sign In';
            }
        });
    </script>
</body>
</html>
