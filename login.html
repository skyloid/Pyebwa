<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pyebwa Family Tree</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1B4332;
            --primary-moss: #2D6A4F;
            --accent-brown: #6B4F3A;
            --accent-sand: #DAD7CD;
            --accent-cream: #FDFCFA;
            --white: #FDFCFA;
            --gray-50: #F5F3EF;
            --gray-100: #EBE9E3;
            --gray-200: #DAD7CD;
            --gray-700: #3A3832;
            --gray-900: #1B1B18;
            --shadow-xl: 0 24px 40px -12px rgba(18, 46, 34, 0.22);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(218, 215, 205, 0.9), transparent 38%),
                radial-gradient(circle at bottom right, rgba(107, 79, 58, 0.18), transparent 32%),
                linear-gradient(135deg, #f5f3ef 0%, #ebe9e3 42%, #dad7cd 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-shell {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .auth-brand-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .auth-brand img {
            width: min(320px, 72vw);
            height: auto;
            display: block;
            filter: drop-shadow(0 12px 24px rgba(18, 46, 34, 0.14));
        }
        .container {
            background: rgba(253, 252, 250, 0.96); border-radius: 20px; padding: 40px;
            box-shadow: var(--shadow-xl); width: 100%; max-width: 420px; position: relative; overflow: hidden;
            border: 1px solid rgba(218, 215, 205, 0.8);
            backdrop-filter: blur(12px);
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary-green) 0%, var(--primary-moss) 52%, var(--accent-brown) 100%);
        }
        h2 { color: var(--gray-900); text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { color: var(--gray-700); text-align: center; font-size: 16px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gray-700); font-weight: 500; font-size: 14px; }
        input {
            width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 8px;
            font-size: 16px; transition: all 0.3s ease; background: var(--gray-50); color: var(--gray-900);
        }
        input:focus { outline: none; border-color: var(--primary-moss); background: var(--white); box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.14); }
        button {
            width: 100%; padding: 14px 20px; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-moss) 100%); color: var(--white); }
        .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #153227 0%, #245740 100%); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(27, 67, 50, 0.24); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .message { margin: 20px 0; padding: 12px 16px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .error { background: #F6E7DE; color: #7A3E23; border: 1px solid #E6C5B3; }
        .success { background: #DDEADF; color: #1B4332; border: 1px solid #B8D0BC; }
        .info { background: #ECE7E0; color: #3A3832; border: 1px solid #D2CBC3; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.35); border-top: 3px solid var(--accent-cream); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: var(--primary-moss); text-decoration: none; font-size: 14px; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .helper-text { color: var(--gray-700); font-size: 13px; line-height: 1.5; margin-top: 12px; text-align: center; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(218, 215, 205, 0.9);
            border-radius: 999px;
            background: rgba(253, 252, 250, 0.92);
            color: var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(18, 46, 34, 0.12);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .theme-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(18, 46, 34, 0.18);
        }
        .theme-toggle .material-icons {
            font-size: 22px;
        }
        body.dark-mode {
            background:
                radial-gradient(circle at top left, rgba(45, 106, 79, 0.24), transparent 38%),
                radial-gradient(circle at bottom right, rgba(107, 79, 58, 0.22), transparent 32%),
                linear-gradient(135deg, #0f1713 0%, #15201a 42%, #1d2b23 100%);
        }
        body.dark-mode .container {
            background: rgba(17, 24, 20, 0.92);
            border-color: rgba(84, 107, 95, 0.45);
            box-shadow: 0 28px 48px -14px rgba(0, 0, 0, 0.52);
        }
        body.dark-mode .auth-brand img {
            filter: drop-shadow(0 16px 26px rgba(0, 0, 0, 0.28));
        }
        body.dark-mode h2 {
            color: #f5f3ef;
        }
        body.dark-mode .subtitle,
        body.dark-mode label,
        body.dark-mode .helper-text,
        body.dark-mode .links,
        body.dark-mode .links span {
            color: #d7d2c8;
        }
        body.dark-mode input {
            background: rgba(245, 243, 239, 0.08);
            border-color: rgba(150, 174, 160, 0.24);
            color: #f5f3ef;
        }
        body.dark-mode input:focus {
            background: rgba(245, 243, 239, 0.12);
            border-color: #2D6A4F;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.2);
        }
        body.dark-mode .theme-toggle {
            background: rgba(17, 24, 20, 0.92);
            border-color: rgba(84, 107, 95, 0.5);
            color: #f5f3ef;
        }
        body.dark-mode .language-selector .lang-btn {
            border-color: rgba(84, 107, 95, 0.45) !important;
            background: rgba(17, 24, 20, 0.92) !important;
            color: #d7d2c8 !important;
        }
        body.dark-mode .language-selector .lang-btn.active {
            background: #2D6A4F !important;
            color: #fdfcfa !important;
        }
        @media (max-width: 640px) {
            .theme-toggle {
                top: 14px;
                left: 14px;
                width: 40px;
                height: 40px;
            }
            .auth-shell {
                gap: 18px;
            }
            .auth-brand img {
                width: min(260px, 68vw);
            }
            .container {
                padding: 34px 24px;
            }
        }
        .back-to-top {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 1000;
            width: 48px;
            height: 48px;
            border: 1px solid rgba(218, 215, 205, 0.9);
            border-radius: 999px;
            background: rgba(253, 252, 250, 0.92);
            color: var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(18, 46, 34, 0.12);
            transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }
        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .back-to-top:hover {
            box-shadow: 0 14px 28px rgba(18, 46, 34, 0.18);
            transform: translateY(-2px);
        }
        .back-to-top .material-icons {
            font-size: 22px;
        }
        body.dark-mode .back-to-top {
            background: rgba(17, 24, 20, 0.92);
            border-color: rgba(84, 107, 95, 0.5);
            color: #f5f3ef;
        }
        @media (max-width: 640px) {
            .back-to-top {
                right: 14px;
                bottom: 14px;
                width: 44px;
                height: 44px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
        <span class="material-icons" id="themeIcon">dark_mode</span>
    </button>
    <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top" title="Back to top">
        <span class="material-icons">arrow_upward</span>
    </button>
    <div class="language-selector" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="lang-btn" data-lang="en" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: rgba(253,252,250,0.92); cursor: pointer; border-radius: 999px; color: #3a3832;">EN</button>
        <button class="lang-btn" data-lang="fr" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: rgba(253,252,250,0.92); cursor: pointer; border-radius: 999px; color: #3a3832;">FR</button>
        <button class="lang-btn active" data-lang="ht" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: #1B4332; color: #fdfcfa; cursor: pointer; border-radius: 999px;">HT</button>
    </div>

    <div class="auth-shell">
        <div class="auth-brand">
            <a class="auth-brand-link" href="https://pyebwa.com" aria-label="Back to homepage">
                <img src="/app/images/pyebwa-title.png" alt="Pyebwa">
            </a>
        </div>
        <div class="container">
            <div id="loginView">
                <h2 data-i18n="signIn">Sign In</h2>
                <p class="subtitle" data-i18n="loginSubtitle">Enter your email and we'll send you a secure sign-in link.</p>
                <div id="message" class="message" style="display: none;"></div>
                <form id="magicLinkForm">
                    <div class="form-group">
                        <label for="email" data-i18n="emailAddress">Email Address</label>
                        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn-primary" id="magicLinkBtn">
                        <i class="material-icons">mail</i>
                        <span data-i18n="sendMagicLink">Email Me a Sign-In Link</span>
                    </button>
                </form>
                <p class="helper-text" data-i18n="magicLinkHelp">Open the email on this device and tap the link to sign in automatically.</p>
                <div class="links">
                    <span data-i18n="noAccount">Don't have an account?</span> <a href="/signup.html?lang=en" id="signupLink" data-i18n="signUp">Sign Up</a><br>
                    <a href="https://pyebwa.com" data-i18n="backToHomepage">&larr; Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: { tagline: "Your Family Tree", signIn: "Sign In", loginSubtitle: "Enter your email and we'll send you a secure sign-in link.", emailAddress: "Email Address", noAccount: "Don't have an account?", signUp: "Sign Up", backToHomepage: "\u2190 Back to Homepage", sendMagicLink: "Email Me a Sign-In Link", magicLinkHelp: "Open the email on this device and tap the link to sign in automatically.", sendingMagicLink: "Sending link...", alreadyLoggedIn: "Already logged in as", redirecting: "Redirecting...", loginSuccess: "Success! Welcome back,", magicLinkSent: "Check your email for your sign-in link.", loginFailed: "Login failed. Please try again.", invalidEmail: "Please enter a valid email address.", networkError: "Network error. Please check your connection and try again.", magicLinkFailed: "Failed to send sign-in link. Please try again.", backToTop: "Back to top" },
            fr: { tagline: "Votre Arbre G\u00e9n\u00e9alogique", signIn: "Se Connecter", loginSubtitle: "Entrez votre email et nous vous enverrons un lien de connexion s\u00e9curis\u00e9.", emailAddress: "Adresse Email", noAccount: "Vous n'avez pas de compte?", signUp: "S'inscrire", backToHomepage: "\u2190 Retour \u00e0 l'Accueil", sendMagicLink: "M'envoyer un lien de connexion", magicLinkHelp: "Ouvrez l'email sur cet appareil et appuyez sur le lien pour vous connecter automatiquement.", sendingMagicLink: "Envoi du lien...", alreadyLoggedIn: "D\u00e9j\u00e0 connect\u00e9 en tant que", redirecting: "Redirection...", loginSuccess: "Succ\u00e8s! Bon retour,", magicLinkSent: "V\u00e9rifiez votre email pour votre lien de connexion.", loginFailed: "\u00c9chec de la connexion.", invalidEmail: "Veuillez saisir une adresse email valide.", networkError: "Erreur r\u00e9seau.", magicLinkFailed: "Impossible d'envoyer le lien de connexion.", backToTop: "Retour en haut" },
            ht: { tagline: "Pyebwa Fanmi w", signIn: "Konekte", loginSubtitle: "Antre email ou epi n ap voye yon lyen sekirize pou konekte.", emailAddress: "Adres Email", noAccount: "Ou pa gen kont?", signUp: "Enskri", backToHomepage: "\u2190 Retounen nan Ak\u00e8y", sendMagicLink: "Voye lyen koneksyon an ba mwen", magicLinkHelp: "Louvri imel la sou aparèy sa a epi peze lyen an pou konekte otomatikman.", sendingMagicLink: "K ap voye lyen an...", alreadyLoggedIn: "Deja konekte k\u00f2m", redirecting: "K ap redirije...", loginSuccess: "Sikse! Byenveni ank\u00f2,", magicLinkSent: "Tcheke imel ou pou lyen koneksyon an.", loginFailed: "Koneksyon echwe.", invalidEmail: "Tanpri antre yon bon adres imel.", networkError: "Er\u00e8 rezo.", magicLinkFailed: "Pa kapab voye lyen koneksyon an.", backToTop: "Retounen anl\u00e8" }
        };

        function setLanguageCookie(lang) {
            const expires = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
            document.cookie = `pyebwa_lang=${lang};expires=${expires};path=/;domain=.pyebwa.com;SameSite=Lax`;
            document.cookie = `pyebwa_lang=${lang};expires=${expires};path=/;SameSite=Lax`;
        }

        function getCookie(name) {
            const nameEQ = name + '=';
            const cookies = document.cookie.split(';');
            for (const rawCookie of cookies) {
                const cookie = rawCookie.trim();
                if (cookie.indexOf(nameEQ) === 0) {
                    return cookie.substring(nameEQ.length);
                }
            }
            return null;
        }

        function detectBrowserLanguage() {
            const browserLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
            const langCode = browserLang.split('-')[0];
            if (supportedLangs.includes(langCode)) {
                return langCode;
            }
            if (browserLang.includes('ht')) return 'ht';
            if (browserLang.includes('fr')) return 'fr';
            if (browserLang.includes('en')) return 'en';
            return 'en';
        }

        const supportedLangs = ['en', 'fr', 'ht'];
        const langFromQuery = new URLSearchParams(window.location.search).get('lang');
        const cookieLang = getCookie('pyebwa_lang');
        const storedLang = localStorage.getItem('pyebwaLang') || localStorage.getItem('language');
        let currentLang =
            (supportedLangs.includes(langFromQuery) && langFromQuery) ||
            (supportedLangs.includes(cookieLang) && cookieLang) ||
            (supportedLangs.includes(storedLang) && storedLang) ||
            detectBrowserLanguage();

        function getStoredTheme() {
            return localStorage.getItem('theme') || localStorage.getItem('pyebwaTheme') || 'light';
        }

        function syncThemeToggle() {
            const isDark = document.body.classList.contains('dark-mode');
            const icon = document.getElementById('themeIcon');
            const toggle = document.getElementById('themeToggle');
            if (icon) icon.textContent = isDark ? 'light_mode' : 'dark_mode';
            if (toggle) {
                toggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                toggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            }
        }

        function applyTheme(theme) {
            document.body.classList.toggle('dark-mode', theme === 'dark');
            localStorage.setItem('theme', theme);
            localStorage.setItem('pyebwaTheme', theme);
            syncThemeToggle();
        }

        localStorage.setItem('pyebwaLang', currentLang);
        localStorage.setItem('language', currentLang);
        setLanguageCookie(currentLang);
        applyTheme(getStoredTheme());

        function t(key) { return (translations[currentLang] || translations.en)[key] || translations.en[key] || key; }
        function updateTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-lang') === currentLang;
                btn.classList.toggle('active', isActive);
                btn.style.background = isActive ? '#1B4332' : 'white';
                btn.style.color = isActive ? 'white' : 'black';
            });
            const backToTopBtn = document.getElementById('backToTop');
            if (backToTopBtn) {
                backToTopBtn.setAttribute('aria-label', t('backToTop'));
                backToTopBtn.setAttribute('title', t('backToTop'));
            }
            const signupLink = document.getElementById('signupLink');
            if (signupLink) {
                signupLink.href = '/signup.html?lang=' + encodeURIComponent(currentLang);
            }
        }
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.getAttribute('data-lang');
                localStorage.setItem('pyebwaLang', currentLang);
                localStorage.setItem('language', currentLang);
                setLanguageCookie(currentLang);
                updateTranslations();
            });
        });
        document.addEventListener('DOMContentLoaded', updateTranslations);
        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');
        });
        const backToTopBtn = document.getElementById('backToTop');
        function syncBackToTopVisibility() {
            backToTopBtn.classList.toggle('visible', window.scrollY > 160);
        }
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        window.addEventListener('scroll', syncBackToTopVisibility, { passive: true });
        syncBackToTopVisibility();

        function hasRecentLogoutIntent() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('logged_out') === '1') {
                return true;
            }

            const logoutAt = sessionStorage.getItem('pyebwaLoggedOutAt') || localStorage.getItem('pyebwaLoggedOutAt');
            if (!logoutAt) {
                return false;
            }

            return (Date.now() - parseInt(logoutAt, 10)) < 15000;
        }

        function clearLogoutIntent() {
            sessionStorage.removeItem('pyebwaLoggedOutAt');
            localStorage.removeItem('pyebwaLoggedOutAt');
            const url = new URL(window.location.href);
            if (url.searchParams.has('logged_out')) {
                url.searchParams.delete('logged_out');
                window.history.replaceState({}, document.title, url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : ''));
            }
        }

        const logoutIntentActive = hasRecentLogoutIntent();

        const messageDiv = document.getElementById('message');
        const magicLinkForm = document.getElementById('magicLinkForm');
        const magicLinkBtn = document.getElementById('magicLinkBtn');

        function showMessage(element, text, type) {
            element.innerHTML = '<i class="material-icons">' + (type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info') + '</i> ' + text;
            element.className = 'message ' + type;
            element.style.display = 'flex';
        }

        async function persistEmailLanguagePreference(email, lang) {
            try {
                await fetch('/api/auth/email-language', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, lang })
                });
            } catch (error) {
                console.warn('[Login] Unable to persist email language preference:', error);
            }
        }

        // Initialize Supabase client
        const _sb = supabase.createClient(window.location.origin + '/supabase', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc1MTk5NDM4LCJleHAiOjE5MzI4Nzk0Mzh9.t_O46hoypu8qZjZgiM_GjMkwhDBhwFa-IXRMjnQ5m7o');

        // Check if already logged in
        _sb.auth.getSession().then(({ data: { session } }) => {
            if (logoutIntentActive) {
                if (session) {
                    _sb.auth.signOut({ scope: 'global' }).catch(() => {});
                }
                clearLogoutIntent();
                return;
            }
            if (session) {
                showMessage(messageDiv, t('alreadyLoggedIn') + ' ' + session.user.email + '. ' + t('redirecting'), 'success');
                setTimeout(() => { window.location.href = '/app/?lang=' + encodeURIComponent(currentLang); }, 1500);
            }
        });

        _sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') {
                clearLogoutIntent();
                return;
            }
            if (logoutIntentActive) {
                return;
            }
            if (!session) return;
            clearLogoutIntent();
            showMessage(messageDiv, t('loginSuccess') + ' ' + session.user.email + '. ' + t('redirecting'), 'success');
            setTimeout(() => { window.location.href = '/app/?lang=' + encodeURIComponent(currentLang); }, 1200);
        });

        magicLinkForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage(messageDiv, t('invalidEmail'), 'error');
                return;
            }

            magicLinkBtn.disabled = true;
            magicLinkBtn.innerHTML = '<span class="loading"></span> ' + t('sendingMagicLink');
            try {
                await persistEmailLanguagePreference(email, currentLang);
                const { error } = await _sb.auth.signInWithOtp({
                    email,
                    options: {
                        shouldCreateUser: false,
                        data: { lang: currentLang },
                        emailRedirectTo: window.location.origin + '/login.html?lang=' + encodeURIComponent(currentLang)
                    }
                });
                if (error) throw new Error(error.message);
                clearLogoutIntent();
                showMessage(messageDiv, t('magicLinkSent'), 'success');
            } catch (error) {
                showMessage(messageDiv, error.message || t('magicLinkFailed'), 'error');
            } finally {
                magicLinkBtn.disabled = false;
                magicLinkBtn.innerHTML = '<i class="material-icons">mail</i> ' + t('sendMagicLink');
            }
        });

    </script>
</body>
</html>
