<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pyebwa Family Tree</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1B4332;
            --primary-moss: #2D6A4F;
            --accent-brown: #6B4F3A;
            --accent-sand: #DAD7CD;
            --accent-cream: #FDFCFA;
            --white: #FDFCFA;
            --gray-50: #F5F3EF;
            --gray-100: #EBE9E3;
            --gray-200: #DAD7CD;
            --gray-700: #3A3832;
            --gray-900: #1B1B18;
            --shadow-xl: 0 24px 40px -12px rgba(18, 46, 34, 0.22);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(218, 215, 205, 0.9), transparent 38%),
                radial-gradient(circle at bottom right, rgba(107, 79, 58, 0.18), transparent 32%),
                linear-gradient(135deg, #f5f3ef 0%, #ebe9e3 42%, #dad7cd 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container {
            background: rgba(253, 252, 250, 0.96); border-radius: 20px; padding: 40px;
            box-shadow: var(--shadow-xl); width: 100%; max-width: 420px; position: relative; overflow: hidden;
            border: 1px solid rgba(218, 215, 205, 0.8);
            backdrop-filter: blur(12px);
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--primary-green) 0%, var(--primary-moss) 52%, var(--accent-brown) 100%);
        }
        .logo { text-align: center; margin-bottom: 10px; }
        .logo h1 { color: var(--primary-green); font-size: 32px; font-weight: 700; }
        .logo p { color: var(--gray-700); font-size: 14px; }
        h2 { color: var(--gray-900); text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { color: var(--gray-700); text-align: center; font-size: 16px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gray-700); font-weight: 500; font-size: 14px; }
        input {
            width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 8px;
            font-size: 16px; transition: all 0.3s ease; background: var(--gray-50); color: var(--gray-900);
        }
        input:focus { outline: none; border-color: var(--primary-moss); background: var(--white); box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.14); }
        button {
            width: 100%; padding: 14px 20px; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-moss) 100%); color: var(--white); }
        .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #153227 0%, #245740 100%); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(27, 67, 50, 0.24); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .message { margin: 20px 0; padding: 12px 16px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .error { background: #F6E7DE; color: #7A3E23; border: 1px solid #E6C5B3; }
        .success { background: #DDEADF; color: #1B4332; border: 1px solid #B8D0BC; }
        .info { background: #ECE7E0; color: #3A3832; border: 1px solid #D2CBC3; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.35); border-top: 3px solid var(--accent-cream); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: var(--primary-moss); text-decoration: none; font-size: 14px; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .helper-text { color: var(--gray-700); font-size: 13px; line-height: 1.5; margin-top: 12px; text-align: center; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="language-selector" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="lang-btn" data-lang="en" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: rgba(253,252,250,0.92); cursor: pointer; border-radius: 999px; color: #3a3832;">EN</button>
        <button class="lang-btn" data-lang="fr" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: rgba(253,252,250,0.92); cursor: pointer; border-radius: 999px; color: #3a3832;">FR</button>
        <button class="lang-btn active" data-lang="ht" style="padding: 8px 12px; margin: 0 2px; border: 1px solid #dad7cd; background: #1B4332; color: #fdfcfa; cursor: pointer; border-radius: 999px;">HT</button>
    </div>

    <div class="container">
        <div class="logo">
            <h1>Pyebwa</h1>
            <p data-i18n="tagline">Your Family Tree</p>
        </div>
        <div id="loginView">
            <h2 data-i18n="signIn">Sign In</h2>
            <p class="subtitle" data-i18n="loginSubtitle">Enter your email and we'll send you a secure sign-in link.</p>
            <div id="message" class="message" style="display: none;"></div>
            <form id="magicLinkForm">
                <div class="form-group">
                    <label for="email" data-i18n="emailAddress">Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                <button type="submit" class="btn-primary" id="magicLinkBtn">
                    <i class="material-icons">mail</i>
                    <span data-i18n="sendMagicLink">Email Me a Sign-In Link</span>
                </button>
            </form>
            <p class="helper-text" data-i18n="magicLinkHelp">Open the email on this device and tap the link to sign in automatically.</p>
            <div class="links">
                <span data-i18n="noAccount">Don't have an account?</span> <a href="/signup.html" data-i18n="signUp">Sign Up</a><br>
                <a href="https://pyebwa.com" data-i18n="backToHomepage">&larr; Back to Homepage</a>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: { tagline: "Your Family Tree", signIn: "Sign In", loginSubtitle: "Enter your email and we'll send you a secure sign-in link.", emailAddress: "Email Address", noAccount: "Don't have an account?", signUp: "Sign Up", backToHomepage: "\u2190 Back to Homepage", sendMagicLink: "Email Me a Sign-In Link", magicLinkHelp: "Open the email on this device and tap the link to sign in automatically.", sendingMagicLink: "Sending link...", alreadyLoggedIn: "Already logged in as", redirecting: "Redirecting...", loginSuccess: "Success! Welcome back,", magicLinkSent: "Check your email for your sign-in link.", loginFailed: "Login failed. Please try again.", invalidEmail: "Please enter a valid email address.", networkError: "Network error. Please check your connection and try again.", magicLinkFailed: "Failed to send sign-in link. Please try again." },
            fr: { tagline: "Votre Arbre G\u00e9n\u00e9alogique", signIn: "Se Connecter", loginSubtitle: "Entrez votre email et nous vous enverrons un lien de connexion s\u00e9curis\u00e9.", emailAddress: "Adresse Email", noAccount: "Vous n'avez pas de compte?", signUp: "S'inscrire", backToHomepage: "\u2190 Retour \u00e0 l'Accueil", sendMagicLink: "M'envoyer un lien de connexion", magicLinkHelp: "Ouvrez l'email sur cet appareil et appuyez sur le lien pour vous connecter automatiquement.", sendingMagicLink: "Envoi du lien...", alreadyLoggedIn: "D\u00e9j\u00e0 connect\u00e9 en tant que", redirecting: "Redirection...", loginSuccess: "Succ\u00e8s! Bon retour,", magicLinkSent: "V\u00e9rifiez votre email pour votre lien de connexion.", loginFailed: "\u00c9chec de la connexion.", invalidEmail: "Veuillez saisir une adresse email valide.", networkError: "Erreur r\u00e9seau.", magicLinkFailed: "Impossible d'envoyer le lien de connexion." },
            ht: { tagline: "Pyebwa Fanmi w", signIn: "Konekte", loginSubtitle: "Antre email ou epi n ap voye yon lyen sekirize pou konekte.", emailAddress: "Adres Email", noAccount: "Ou pa gen kont?", signUp: "Enskri", backToHomepage: "\u2190 Retounen nan Ak\u00e8y", sendMagicLink: "Voye lyen koneksyon an ba mwen", magicLinkHelp: "Louvri imel la sou aparèy sa a epi peze lyen an pou konekte otomatikman.", sendingMagicLink: "K ap voye lyen an...", alreadyLoggedIn: "Deja konekte k\u00f2m", redirecting: "K ap redirije...", loginSuccess: "Sikse! Byenveni ank\u00f2,", magicLinkSent: "Tcheke imel ou pou lyen koneksyon an.", loginFailed: "Koneksyon echwe.", invalidEmail: "Tanpri antre yon bon adres imel.", networkError: "Er\u00e8 rezo.", magicLinkFailed: "Pa kapab voye lyen koneksyon an." }
        };

        let currentLang = localStorage.getItem('pyebwaLang') || 'ht';
        function t(key) { return (translations[currentLang] || translations.en)[key] || translations.en[key] || key; }
        function updateTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-lang') === currentLang;
                btn.style.background = isActive ? '#1B4332' : 'white';
                btn.style.color = isActive ? 'white' : 'black';
            });
        }
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentLang = btn.getAttribute('data-lang'); localStorage.setItem('pyebwaLang', currentLang); updateTranslations(); });
        });
        document.addEventListener('DOMContentLoaded', updateTranslations);

        const messageDiv = document.getElementById('message');
        const magicLinkForm = document.getElementById('magicLinkForm');
        const magicLinkBtn = document.getElementById('magicLinkBtn');

        function showMessage(element, text, type) {
            element.innerHTML = '<i class="material-icons">' + (type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info') + '</i> ' + text;
            element.className = 'message ' + type;
            element.style.display = 'flex';
        }

        // Initialize Supabase client
        const _sb = supabase.createClient(window.location.origin + '/supabase', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc1MTk5NDM4LCJleHAiOjE5MzI4Nzk0Mzh9.t_O46hoypu8qZjZgiM_GjMkwhDBhwFa-IXRMjnQ5m7o');

        // Check if already logged in
        _sb.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                showMessage(messageDiv, t('alreadyLoggedIn') + ' ' + session.user.email + '. ' + t('redirecting'), 'success');
                setTimeout(() => { window.location.href = '/app/'; }, 1500);
            }
        });

        _sb.auth.onAuthStateChange((event, session) => {
            if (!session) return;
            showMessage(messageDiv, t('loginSuccess') + ' ' + session.user.email + '. ' + t('redirecting'), 'success');
            setTimeout(() => { window.location.href = '/app/'; }, 1200);
        });

        magicLinkForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage(messageDiv, t('invalidEmail'), 'error');
                return;
            }

            magicLinkBtn.disabled = true;
            magicLinkBtn.innerHTML = '<span class="loading"></span> ' + t('sendingMagicLink');
            try {
                const { error } = await _sb.auth.signInWithOtp({
                    email,
                    options: {
                        shouldCreateUser: false,
                        emailRedirectTo: window.location.origin + '/login.html'
                    }
                });
                if (error) throw new Error(error.message);
                showMessage(messageDiv, t('magicLinkSent'), 'success');
            } catch (error) {
                showMessage(messageDiv, error.message || t('magicLinkFailed'), 'error');
            } finally {
                magicLinkBtn.disabled = false;
                magicLinkBtn.innerHTML = '<i class="material-icons">mail</i> ' + t('sendMagicLink');
            }
        });

    </script>
</body>
</html>
