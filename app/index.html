<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyebwa - Your Family Tree</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Ensure mobile nav is hidden on desktop -->
    <style>
        @media (min-width: 769px) {
            .mobile-nav,
            .mobile-menu-btn {
                display: none !important;
            }
        }
        
        /* Ensure mobile nav shows on mobile when active */
        @media (max-width: 768px) {
            .mobile-nav.active {
                display: block !important;
            }
        }
    </style>
    
    <!-- Cross-domain auth scripts removed - using single-domain auth now -->
    <!-- All authentication handled on same domain at /login/ -->
    
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.__PYEBWA_VERSION_URL__ = '/app/version.json';
        window.__PYEBWA_BUILD_ID__ = null;
        window.__PYEBWA_VERSION__ = null;
        window.__PYEBWA_LOCAL_CSS__ = [
            '/app/css/app-modern.css',
            '/app/css/tree.css',
            '/app/css/tree-modern.css',
            '/app/css/tree-responsive.css',
            '/app/css/tree-controls.css',
            '/app/css/tree-print.css',
            '/app/css/member-profile.css',
            '/app/css/share-card.css',
            '/app/css/social-media.css',
            '/app/css/invite-modal.css',
            '/app/css/onboarding-flow.css',
            '/app/css/video-messages.css',
            '/app/css/animations.css',
            '/app/css/mobile.css',
            '/app/css/desktop.css',
            '/app/css/mobile-fix.css',
            '/app/css/mobile-nav-fix.css',
            '/app/css/footer.css',
            '/app/css/family-statistics.css',
            '/app/css/dark-mode-complete.css'
        ];
        window.__PYEBWA_BOOT_SCRIPTS__ = [
            '/app/js/supabase-client.js',
            '/app/js/api-client.js'
        ];
        window.__PYEBWA_APP_SCRIPTS__ = [
            '/app/js/auth-enhanced.js',
            '/app/js/device-detection.js',
            '/app/js/auth-emergency-fix.js',
            '/app/js/app-loop-fix.js',
            '/app/js/tablet-loop-fix.js',
            '/app/js/tablet-debug.js',
            '/app/js/cookies.js',
            '/app/js/translations.js',
            '/app/js/language-detection.js',
            '/app/js/language-integration.js',
            '/app/js/debug-utils.js',
            '/app/js/ui-helpers.js',
            '/app/js/app.js',
            '/app/js/tree.js',
            '/app/js/tree-responsive.js',
            '/app/js/tree-controls.js',
            '/app/js/tree-views.js',
            '/app/js/tree-performance.js',
            '/app/js/tree-export.js',
            '/app/js/relationship-engine.js',
            '/app/js/members.js',
            '/app/js/member-profile.js',
            '/app/js/share-card.js',
            '/app/js/photo-gallery.js',
            '/app/js/document-manager.js',
            '/app/js/stories.js',
            '/app/js/video-messages.js',
            '/app/js/back-to-top.js',
            '/app/js/mobile-nav-simple.js',
            '/app/js/dashboard.js',
            '/app/js/family-statistics.js',
            '/app/js/onboarding.js',
            '/app/js/onboarding-flow.js',
            '/app/js/pdf-export.js',
            '/app/js/modal-fix.js',
            '/app/js/performance-monitor.js',
            '/app/js/lazy-load.js',
            '/app/js/sw-register.js',
            '/app/js/version-watcher.js',
            '/app/js/security-headers.js',
            '/app/js/input-validator.js',
            '/app/js/rate-limiter.js',
            '/app/js/search-engine.js',
            '/app/js/search-ui.js',
            '/app/js/search-migration.js',
            '/app/js/push-notifications.js',
            '/app/js/theme-toggle-inline.js'
        ];
        window.__PYEBWA_versionPromise = (async function() {
            let payload = { buildId: String(Date.now()) };

            try {
                const response = await fetch(window.__PYEBWA_VERSION_URL__, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });

                if (response.ok) {
                    payload = await response.json();
                }
            } catch (error) {
                console.warn('Falling back to timestamp build id:', error);
            }

            window.__PYEBWA_BUILD_ID__ = payload.buildId;
            window.__PYEBWA_VERSION__ = payload.version || null;
            return payload;
        })();
        window.__PYEBWA_assetUrl = function(path) {
            if (/^(https?:)?\/\//.test(path)) {
                return path;
            }

            const url = new URL(path, window.location.origin);
            url.searchParams.set('v', window.__PYEBWA_BUILD_ID__ || 'dev');
            return url.pathname + url.search;
        };
        window.__PYEBWA_loadStyle = function(path) {
            return new Promise((resolve, reject) => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = window.__PYEBWA_assetUrl(path);
                link.onload = resolve;
                link.onerror = reject;
                document.head.appendChild(link);
            });
        };
        window.__PYEBWA_loadScript = function(path) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = window.__PYEBWA_assetUrl(path);
                script.async = false;
                script.onload = resolve;
                script.onerror = reject;
                (document.body || document.head).appendChild(script);
            });
        };
        window.__PYEBWA_headAssetsPromise = window.__PYEBWA_versionPromise.then(async () => {
            for (const href of window.__PYEBWA_LOCAL_CSS__) {
                await window.__PYEBWA_loadStyle(href);
            }
            for (const src of window.__PYEBWA_BOOT_SCRIPTS__) {
                await window.__PYEBWA_loadScript(src);
            }
        });
    </script>
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Header Navigation -->
        <header class="app-header">
            <div class="header-container">
                <div class="header-left">
                    <div class="app-logo-container">
                        <img src="/app/images/pyebwa-title.png" alt="Pyebwa" class="app-logo-img">
                    </div>
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                        <span class="material-icons">menu</span>
                    </button>
                    <nav class="nav-menu">
                        <button class="nav-item active" data-view="dashboard">
                            <span class="material-icons">dashboard</span>
                            <span data-i18n="navDashboard">Dashboard</span>
                        </button>
                        <button class="nav-item" data-view="tree">
                            <span class="material-icons">account_tree</span>
                            <span data-i18n="navTree">Pyebwa Fanmi</span>
                        </button>
                        <button class="nav-item" data-view="members">
                            <span class="material-icons">people</span>
                            <span data-i18n="navMembers">Manm yo</span>
                        </button>
                        <button class="nav-item" data-view="stories">
                            <span class="material-icons">history_edu</span>
                            <span data-i18n="navStories">Istwa</span>
                        </button>
                    </nav>
                </div>
                <div class="header-right">
                    <div class="language-selector">
                        <button class="lang-btn" data-lang="en">EN</button>
                        <button class="lang-btn" data-lang="fr">FR</button>
                        <button class="lang-btn active" data-lang="ht">HT</button>
                    </div>
                    <div class="user-menu">
                        <button class="user-menu-btn">
                            <span class="material-icons">account_circle</span>
                            <span class="user-email"></span>
                            <span class="material-icons">arrow_drop_down</span>
                        </button>
                        <div class="user-dropdown">
                            <div class="user-dropdown-inner">
                                <a href="#" data-i18n="profile">Pwofil</a>
                                <a href="#" data-i18n="settings">Paramèt</a>
                                <a href="/admin" id="adminLink" style="display:none;">
                                    <span class="material-icons" style="font-size: 16px; margin-right: 4px;">admin_panel_settings</span>
                                    Admin Dashboard
                                </a>
                                <hr>
                                <a href="https://pyebwa.com">Home</a>
                                <a href="https://pyebwa.com/about.html">About</a>
                                <a href="https://pyebwa.com/mission.html">Our Mission</a>
                                <a href="https://pyebwa.com/contact.html">Contact</a>
                                <hr>
                                <a href="#" id="logoutBtn" data-i18n="logout">Dekonekte</a>
                            </div>
                        </div>
                    </div>
                    <button id="themeToggle" class="header-theme-toggle" aria-label="Toggle dark mode">
                        <span class="material-icons" id="themeIcon">dark_mode</span>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Mobile Navigation -->
        <div class="mobile-nav" id="mobileNav">
            <div class="mobile-nav-content">
                <div class="mobile-nav-header">
                    <div class="app-logo-container">
                        <img src="/app/images/pyebwa-title.png" alt="Pyebwa" class="app-logo-img app-logo-img-mobile">
                    </div>
                    <button class="mobile-menu-btn" id="mobileMenuClose" aria-label="Close menu">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <div class="mobile-nav-items">
                    <button class="mobile-nav-item active" data-view="dashboard">
                        <span class="material-icons">dashboard</span>
                        <span data-i18n="navDashboard">Dashboard</span>
                    </button>
                    <button class="mobile-nav-item" data-view="tree">
                        <span class="material-icons">account_tree</span>
                        <span data-i18n="navTree">Pyebwa Fanmi</span>
                    </button>
                    <button class="mobile-nav-item" data-view="members">
                        <span class="material-icons">people</span>
                        <span data-i18n="navMembers">Manm yo</span>
                    </button>
                    <button class="mobile-nav-item" data-view="stories">
                        <span class="material-icons">auto_stories</span>
                        <span data-i18n="navStories">Istwa</span>
                    </button>
                    <hr style="margin: 20px;">
                    <button class="mobile-nav-item" id="mobileLogoutBtn">
                        <span class="material-icons">logout</span>
                        <span data-i18n="logout">Dekonekte</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="app-main">
            <!-- Loading State -->
            <div id="loadingView" class="view-container">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p data-i18n="loading">Chajman...</p>
                </div>
            </div>

            <!-- Dashboard View -->
            <div id="dashboardView" class="view-container" style="display: none;">
                <!-- Dashboard content will be dynamically loaded here -->
            </div>

            <!-- Tree View -->
            <div id="treeView" class="view-container" style="display: none;">
                <div class="view-header">
                    <h2 data-i18n="familyTree">Pyebwa Fanmi Mwen</h2>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <div class="tree-mode-toggle" id="treeModeToggle">
                            <button class="mode-btn active" data-mode="view" title="View mode — click to explore" onclick="setTreeInteractionMode('view')">
                                <span class="material-icons">visibility</span>
                                <span>View</span>
                            </button>
                            <button class="mode-btn" data-mode="edit" title="Edit mode — click to edit profiles" onclick="setTreeInteractionMode('edit')">
                                <span class="material-icons">edit</span>
                                <span>Edit</span>
                            </button>
                        </div>
                        <button class="btn btn-primary" id="addMemberBtn">
                            <span class="material-icons">person_add</span>
                            <span data-i18n="addMember">Ajoute Manm</span>
                        </button>
                        <button class="btn btn-secondary" onclick="showExportOptions()">
                            <span class="material-icons">download</span>
                            <span data-i18n="export">Export</span>
                        </button>
                    </div>
                </div>
                
                <div id="treeContainer" class="tree-container">
                    <!-- Tree visualization will be rendered here -->
                </div>
            </div>

            <!-- Members List View -->
            <div id="membersView" class="view-container" style="display: none;">
                <div class="view-header">
                    <h2 data-i18n="familyMembers">Manm Fanmi yo</h2>
                    <div class="search-box">
                        <span class="material-icons">search</span>
                        <input type="text" id="memberSearch" placeholder="Chèche..." data-i18n-placeholder="search">
                    </div>
                </div>
                <div class="members-grid" id="membersGrid">
                    <!-- Member cards will be rendered here -->
                </div>
            </div>

            <!-- Stories View -->
            <div id="storiesView" class="view-container" style="display: none;">
                <div class="view-header">
                    <h2 data-i18n="familyStories">Istwa Fanmi</h2>
                    <button class="btn btn-primary" id="addStoryBtn">
                        <span class="material-icons">add_circle</span>
                        <span data-i18n="addStory">Ajoute Istwa</span>
                    </button>
                </div>
                <div class="stories-list" id="storiesList">
                    <!-- Stories will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Add Member Modal -->
        <div class="modal" id="addMemberModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 data-i18n="addFamilyMember">Ajoute Manm Fanmi</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <form id="addMemberForm" class="modal-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="firstName">Non</label>
                            <input type="text" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="lastName">Siyati</label>
                            <input type="text" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nickname</label>
                            <input type="text" name="nickname" placeholder="What family calls them">
                        </div>
                        <div class="form-group" style="display:flex; align-items:flex-end;">
                            <label style="display:flex; align-items:center; gap:10px; margin:0; font-weight:500;">
                                <input type="checkbox" name="useNickname" style="width:auto; margin:0;">
                                <span>Use nickname in tree</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="gender">Sèks</label>
                            <select name="gender" required>
                                <option value="male" data-i18n="male">Gason</option>
                                <option value="female" data-i18n="female">Fi</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="birthDate">Dat nesans</label>
                            <input type="date" name="birthDate">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="deathDate">Dat lanmò</label>
                            <input type="date" name="deathDate">
                        </div>
                        <div class="form-group">
                            <label data-i18n="email">Email</label>
                            <input type="email" name="email" placeholder="example@email.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="relationships">Relationships</label>
                        <div id="relationshipsContainer"></div>
                        <button type="button" class="btn btn-secondary btn-sm" id="addRelationshipBtn" style="margin-top:8px;">
                            <span class="material-icons" style="font-size:16px;">add</span>
                            <span data-i18n="addRelationship">Add Relationship</span>
                        </button>
                    </div>

                    <div class="form-group">
                        <label data-i18n="biography">Biyografi</label>
                        <textarea name="biography" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label data-i18n="photo">Foto</label>
                        <input type="file" name="photo" accept="image/*">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" data-i18n="cancel">Anile</button>
                        <button type="submit" class="btn btn-primary" data-i18n="save">Anrejistre</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 Pyebwa version <span data-build-version>1.0.28</span> - <span data-i18n="poweredBy">Powered by</span> <a class="footer-company-link" href="https://humanlevel.ai" target="_blank" rel="noopener noreferrer" data-i18n="humanLevelTech">Technologies Humanitaires Inc.</a></p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous"></script>
    <script>
        (async function() {
            await window.__PYEBWA_headAssetsPromise;

            for (const src of window.__PYEBWA_APP_SCRIPTS__) {
                await window.__PYEBWA_loadScript(src);
            }
        })();
    </script>
</body>
</html>
